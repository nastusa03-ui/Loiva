<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1020">
<meta name="yandex-overflow-behavior" content="contain">
<title>Loiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B1020;--surface:#141B2D;--surface-light:#1E2A42;
  --primary:#6C63FF;--secondary:#FF6584;--accent:#64FFDA;
  --text:#FFFFFF;--text-sec:#8892B0;--muted:#495670;
  --error:#FF6B6B;--warning:#FFB347;--success:#64FFDA;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:68px;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  height:100%;margin:0;padding:0;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  overflow:hidden;overscroll-behavior:none;
  position:fixed;width:100%;
}
.app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);overflow:hidden;display:flex;flex-direction:column}

/* ===== SCREENS ===== */
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);z-index:1;
  opacity:0;visibility:hidden;
  transition:opacity .3s ease,transform .3s ease;
  transform:translateX(20px);
}
.screen.active{opacity:1;visibility:visible;transform:translateX(0);z-index:2}
.screen.prev{transform:translateX(-20px);opacity:0}

/* ===== ONBOARDING ===== */
.onboard{justify-content:center;align-items:center;padding:24px;text-align:center;overflow-y:auto}
.onboard .back-btn{
  position:absolute;top:calc(12px + var(--safe-top));left:16px;
  background:none;border:none;color:var(--text-sec);font-size:28px;
  cursor:pointer;padding:8px;z-index:10;line-height:1;
}
.onboard h1{font-size:42px;font-weight:700;letter-spacing:-1px;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.onboard p{font-size:15px;color:var(--text-sec);margin-bottom:36px;line-height:1.5}
.onboard .hero{font-size:56px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:15px 28px;border-radius:14px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .15s;width:100%;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--surface-light)}
.btn-outline:active{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:12px 20px;font-size:14px;border-radius:12px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:300px;margin-bottom:28px}
.lang-card{padding:18px 12px;border-radius:16px;background:var(--surface);border:2px solid transparent;cursor:pointer;transition:all .15s;text-align:center}
.lang-card.selected{border-color:var(--primary);background:var(--surface-light)}
.lang-card .flag{font-size:28px;margin-bottom:6px}
.lang-card .name{font-size:13px;font-weight:500}
.dots{display:flex;gap:8px;margin-top:20px;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:all .3s}
.dot.active{background:var(--primary);width:24px;border-radius:4px}
.onboard-step{padding:20px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;width:100%;max-width:360px}
.onboard-step h2{font-size:24px;font-weight:700;margin-bottom:10px}
.onboard-step p{font-size:14px;color:var(--text-sec);margin-bottom:28px;line-height:1.6}
.privacy-toggle{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px 0;border-bottom:1px solid var(--surface-light)}
.privacy-toggle:last-child{border:none}
.privacy-toggle span{font-size:14px}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--muted);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* ===== MAIN APP ===== */
.main-wrap{display:flex;flex-direction:column;height:100%;position:relative}
.topbar{
  padding:calc(8px + var(--safe-top)) 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--bg);z-index:5;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.topbar h2{font-size:18px;font-weight:700}
.topbar .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
.topbar .back-arrow{
  background:none;border:none;color:var(--text);font-size:22px;
  cursor:pointer;padding:4px 8px 4px 0;margin-right:8px;
}
.tab-area{flex:1;overflow:hidden;position:relative}
.tab-content{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px)}
.tab-content[hidden]{display:none}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:relative;flex-shrink:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--surface);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:stretch;justify-content:space-around;
  z-index:10;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:6px 8px;flex:1;
  -webkit-tap-highlight-color:transparent;
}
.nav-icon{font-size:20px;opacity:.45;transition:opacity .2s;line-height:1}
.nav-label{font-size:10px;color:var(--muted);font-weight:500;transition:color .2s}
.nav-item.active .nav-icon{opacity:1}
.nav-item.active .nav-label{color:var(--primary);font-weight:600}

/* ===== HOME ===== */
.greeting{margin-bottom:20px}
.greeting h3{font-size:20px;font-weight:700;margin-bottom:2px}
.greeting p{font-size:13px;color:var(--text-sec)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.action-card{
  padding:16px 14px;border-radius:16px;background:var(--surface);
  cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.action-card:active{transform:scale(.97);border-color:var(--primary)}
.action-card .icon{font-size:24px;margin-bottom:8px}
.action-card .label{font-size:13px;font-weight:600}
.action-card .desc{font-size:11px;color:var(--text-sec);margin-top:2px}
.calm-card{padding:16px;border-radius:16px;background:linear-gradient(135deg,#1a1040,#0d1a30);border:1px solid var(--surface-light);margin-bottom:20px}
.calm-card h4{font-size:15px;font-weight:600;margin-bottom:4px}
.calm-card p{font-size:12px;color:var(--text-sec);line-height:1.5}
.section-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text-sec)}

/* ===== CHAT ===== */
.chat-screen{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{max-width:82%;padding:12px 14px;border-radius:16px;font-size:13.5px;line-height:1.5;animation:fadeIn .3s ease;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--primary);border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--surface);border-bottom-left-radius:4px}
.msg.ai .mode{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.chat-input{
  padding:10px 14px calc(10px + var(--safe-bottom));
  border-top:1px solid var(--surface-light);
  display:flex;gap:8px;align-items:center;
  background:var(--bg);flex-shrink:0;
}
.chat-input input{
  flex:1;padding:12px 14px;border-radius:24px;
  background:var(--surface);border:1px solid var(--surface-light);
  color:var(--text);font-size:14px;outline:none;font-family:inherit;
}
.chat-input input:focus{border-color:var(--primary)}
.chat-input button{
  width:40px;height:40px;border-radius:50%;
  background:var(--primary);border:none;color:#fff;
  font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.typing{display:flex;gap:4px;padding:12px 14px;background:var(--surface);border-radius:16px;align-self:flex-start;width:fit-content}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-sec);text-align:center;padding:20px}
.chat-empty .icon{font-size:48px;margin-bottom:12px;opacity:.6}
.chat-empty p{font-size:13px;line-height:1.5}

/* ===== TECHNIQUES ===== */
.technique-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.technique-card{padding:14px;border-radius:14px;background:var(--surface);cursor:pointer;transition:all .15s;border:1px solid transparent}
.technique-card:active{border-color:var(--primary)}
.technique-card h4{font-size:14px;font-weight:600;margin-bottom:3px}
.technique-card p{font-size:12px;color:var(--text-sec);line-height:1.4}
.technique-card .tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;margin-top:6px;background:var(--surface-light);color:var(--primary)}
.tag-crisis{background:rgba(255,107,107,.15);color:var(--error)}
.tag-breathing{background:rgba(108,99,255,.15);color:var(--primary)}
.tag-mindfulness{background:rgba(100,255,218,.15);color:var(--accent)}

/* ===== PROGRESS ===== */
.streak-card{padding:20px;border-radius:18px;background:linear-gradient(135deg,var(--surface),var(--surface-light));text-align:center;margin-bottom:20px}
.streak-num{font-size:56px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.streak-label{font-size:13px;color:var(--text-sec);margin-top:4px}
.habit-list{display:flex;flex-direction:column;gap:8px}
.habit-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--surface);cursor:pointer;transition:all .15s}
.habit-item:active{background:var(--surface-light)}
.habit-check{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.habit-item.done .habit-check{background:var(--primary);border-color:var(--primary)}
.habit-item.done .habit-check::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.habit-info h4{font-size:13px;font-weight:600}
.habit-info p{font-size:11px;color:var(--text-sec)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{padding:14px;border-radius:12px;background:var(--surface);text-align:center}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .lbl{font-size:11px;color:var(--text-sec);margin-top:2px}

/* ===== SETTINGS ===== */
.settings-group{margin-bottom:20px}
.settings-group h4{font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;padding-left:4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  background:var(--surface);margin-bottom:1px;cursor:pointer;
  transition:background .15s;
}
.settings-item:first-child{border-radius:12px 12px 2px 2px}
.settings-item:last-child{border-radius:2px 2px 12px 12px}
.settings-item:only-child{border-radius:12px}
.settings-item:active{background:var(--surface-light)}
.settings-item .icon{font-size:18px;width:22px;text-align:center}
.settings-item .label{flex:1;font-size:14px}
.settings-item .arrow{color:var(--muted);font-size:13px}

/* ===== TECHNIQUE DETAIL ===== */
.detail-overlay{
  position:absolute;inset:0;background:var(--bg);z-index:20;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s ease;
}
.detail-overlay.open{transform:translateY(0)}
.detail-header{
  padding:calc(12px + var(--safe-top)) 16px 12px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;
}
.detail-header .back{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px}
.detail-header h2{font-size:17px;font-weight:600;flex:1}
.detail-body{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.detail-body h3{font-size:18px;font-weight:700;margin-bottom:8px}
.detail-body p{font-size:14px;color:var(--text-sec);line-height:1.7;margin-bottom:16px}
.detail-body .step{padding:14px;border-radius:12px;background:var(--surface);margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.detail-body .step-num{
  width:28px;height:28px;border-radius:50%;background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.detail-body .step-text{font-size:14px;line-height:1.5}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

@media(min-width:481px){
  .app{border-left:1px solid var(--surface-light);border-right:1px solid var(--surface-light)}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const LS_KEY = 'loiva_onboarded';
const onboardingDone = localStorage.getItem(LS_KEY) === '1';

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

const $ = id => document.getElementById(id);
const app = $('app');

/* ===== TECHNIQUE DATA ===== */
const techniques = [
  {icon:'🫁',title:'Дыхание 4-7-8',tag:'Дыхание',tagCls:'tag-breathing',

  {icon:'🧊',title:'Техника 5-4-3-2-1',tag:'Осознанность',tagCls:'tag-mindfulness',

  {icon:'📝',title:'Cognitive Restructuring',tag:'CBT',tagCls:'',
   desc:'Выявление искажённых мыслей и их замена на более реалистичные.',
   full:'Когнитивно-поведенческая техника. Мы часто думаем хуже, чем есть на самом деле.',
   steps:['Запиши тревожную мысль целиком.','Определи тип искажения: катастрофизация, чёрно-белое мышление, чтение мыслей?','Найди доказательства ЗА эту мысль.','Найди доказательства ПРОТИВ.','Сформулируй более сбалансированную мысль.']},
  {icon:'🫀',title:'Расслабление мышц',tag:'Расслабление',tagCls:'',
   desc:'Чередование напряжения и расслабления групп мышц по всему телу.',
   full:'Прогрессивная мышечная релаксация (ПМР) — проверенная техника для снятия физического напряжения.',
   steps:['Напряги руки (кулачки) на 5 секунд. Затем расслабь на 10 сек. Отметь разницу.','Подыми плечи к ушам, задержь на 5 сек. Опусти, расслабь на 10 сек.','Напряги лицо — наморщи нос, сожми глаза на 5 сек. Расслабь.','Напряги пресс на 5 сек. Расслабь.','Напряги ноги — носки на себя на 5 сек. Расслабь. Отметь общее расслабление.']},
  {icon:'🧘',title:'Body Scan Meditation',tag:'Медитация',tagCls:'tag-mindfulness',
   desc:'Осознанное прохождение вниманием через каждую часть тела.',

  {icon:'🆘',title:'Crisis Grounding',tag:'Кризис',tagCls:'tag-crisis',

   full:'Если ты в кризисе — помни: это временно. Ты в безопасности. Следуй шагам.',

  {icon:'💌',title:'Журнал благодарности',tag:'Благодарность',tagCls:'',
   desc:'Запись трёх вещей, за которые ты благодарен сегодня.',
   full:'Исследования показывают, что практика благодарности снижает уровень кортизола и улучшает настроение.',

  {icon:'🌈',title:'Визуализация',tag:'Визуализация',tagCls:'tag-mindfulness',
   desc:'Гидированная визуализация безопасного и спокойного места.',
   full:'Визуализация активирует те же зоны мозга, что и реальный опыт. Твоё тело не отличает воображение от реальности.',
   steps:['Закрой глаза. Сделай 3 глубоких вдоха.','Представь место, где тебе безопасно и спокойно. Это может быть лес, пляж, комната...','Заметь детали: что ты видишь? Какие звуки? Как пахнет?','Почувствуй температуру, текстуру поверхностей. Побудь здесь минуту.','Когда будешь готова — медленно открой глаза.']},
];

  'Я понимаю тебя. Расскажи подробнее, что происходит?',
  'Спасибо, что делишься. Твои чувства важны и имеют значение.',
  'Это нормально чувствовать так. Давай сделаем глубокий вдох вместе.',
  'Я здесь рядом. Ты не одна в этом. Что бы ты хотела сделать сейчас?',
  'Попробуй технику 5-4-3-2-1: назови 5 вещей, которые видишь.',
  'Звучит непросто. Как давно ты так себя чувствуешь?',
  'Я вижу, что тебе тяжело. Это смело — говорить об этом. Продолжай.',
  'Давай попробуем дыхательную технику 4-7-8. Хочешь, я проведу тебя?',
];

/* ===== RENDER FUNCTIONS ===== */
function renderOnboarding() {
  app.innerHTML = '';
  const screens = [
    {id:'w',html:`
      <div class="onboard-step">
        <div class="hero">🧠</div>
        <h1 style="font-size:38px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">LOIVA</h1>
        <p>Поддержка, в твоём темпе.<br>AI-компаньон для эмоционального здоровья.</p>
        <button class="btn btn-primary" data-next="l">Начать</button>
        <div class="dots" data-dots="0"></div>
      </div>`},
    {id:'l',back:'w',html:`
      <div class="onboard-step">
        <h2>Выбери язык</h2>
        <p>Loiva поддерживает русский и английский</p>
        <div class="lang-grid">
          <div class="lang-card selected" onclick="this.parentElement.querySelectorAll('.lang-card').forEach(c=>c.classList.remove('selected'));this.classList.add('selected')"><div class="flag">🇷🇺</div><div class="name">Русский</div></div>
          <div class="lang-card" onclick="this.parentElement.querySelectorAll('.lang-card').forEach(c=>c.classList.remove('selected'));this.classList.add('selected')"><div class="flag">🇬🇧</div><div class="name">English</div></div>
        </div>
        <button class="btn btn-primary" data-next="d">Далее</button>
        <div class="dots" data-dots="1"></div>
      </div>`},
    {id:'d',back:'l',html:`
      <div class="onboard-step">
        <div style="font-size:44px;margin-bottom:12px">ℹ️</div>
        <h2>Важная информация</h2>
        <p>Loiva — это AI-компаньон, а не замена профессиональной помощи. В случае кризиса обращайтесь на горячую линию.</p>
        <button class="btn btn-primary" data-next="p" style="margin-bottom:10px">Я понимаю</button>
        <button class="btn btn-outline btn-sm" data-next="p">Пропустить</button>
        <div class="dots" data-dots="2"></div>
      </div>`},
    {id:'p',back:'d',html:`
      <div class="onboard-step">
        <h2>Настрой приватность</h2>
        <p>Ты контролируешь свои данные</p>
        <div style="width:100%;max-width:320px">
          <div class="privacy-toggle"><span>История чатов</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="privacy-toggle"><span>AI-память</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="privacy-toggle"><span>Аналитика</span><div class="toggle" onclick="this.classList.toggle('on')"></div></div>
          <div class="privacy-toggle"><span>Уведомления</span><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
        </div>
        <button class="btn btn-primary" data-next="done" style="margin-top:20px">Готово</button>
        <div class="dots" data-dots="3"></div>
      </div>`},
    {id:'done',back:'p',html:`
      <div class="onboard-step">
        <div style="font-size:56px;margin-bottom:12px">✨</div>
        <h2>Всё готово!</h2>
        <p>Loiva настроена. Начни диалог — я здесь, чтобы поддержать.</p>
        <button class="btn btn-primary" data-next="app">Войти</button>
      </div>`},
  ];

  let cur = 0;
  function show(idx) {
    cur = idx;
    app.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = app.querySelector(`[data-oidx="${idx}"]`);
    if (el) el.classList.add('active');
    // dots
    app.querySelectorAll('.dots').forEach(d => {
      const di = parseInt(d.dataset.dots);
      d.innerHTML = [0,1,2,3].map(i => `<div class="dot${i===di?' active':''}"></div>`).join('');
    });
  }

  screens.forEach((s, i) => {
    const el = h('div', {class:'screen onboard', 'data-oidx':i});
    el.innerHTML = s.html;
    if (s.back) {
      const bb = h('button', {class:'back-btn', html:'←', onClick:()=>show(screens.findIndex(x=>x.id===s.back))});
      el.appendChild(bb);
    }
    el.querySelectorAll('[data-next]').forEach(btn => {
      btn.addEventListener('click', () => {
        const next = btn.dataset.next;
        if (next === 'app') { localStorage.setItem(LS_KEY,'1'); renderApp(); return; }
        const ni = screens.findIndex(x=>x.id===next);
        if (ni >= 0) show(ni);
      });
    });
    app.appendChild(el);
  });

  show(0);
}

function renderApp() {
  app.innerHTML = '';
  const wrap = h('div',{class:'main-wrap'});

  // Topbar
  const topbar = h('div',{class:'topbar', html:'<h2>Loiva</h2><div class="avatar">👤</div>'});
  wrap.appendChild(topbar);

  // Tab area
  const tabArea = h('div',{class:'tab-area'});

  // HOME
  const homeTab = h('div',{class:'tab-content',id:'tab-home'});
  homeTab.innerHTML = `
    <div style="padding:16px">
      <div class="greeting"><h3>Привет! 👋</h3><p>Как ты себя чувствуешь сегодня?</p></div>
      <div class="quick-actions">
        <div class="action-card" data-tab="tab-chat"><div class="icon">💬</div><div class="label">Поговорить</div><div class="desc">Начать диалог</div></div>
        <div class="action-card" data-tab="tab-techniques"><div class="icon">🧘</div><div class="label">Техники</div><div class="desc">Дыхание, осознанность</div></div>
        <div class="action-card" data-tab="tab-progress"><div class="icon">📊</div><div class="label">Прогресс</div><div class="desc">Статистика</div></div>
        <div class="action-card" data-tab="tab-home"><div class="icon">🌙</div><div class="label">Calm Room</div><div class="desc">Пространство покоя</div></div>
      </div>
      <div class="calm-card"><h4>🌙 Calm Room</h4><p>Тихое пространство для медитации и дыхательных практик.</p></div>
      <div class="section-title">Последние чаты</div>
      <div class="action-card" data-tab="tab-chat" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:10px;background:var(--surface-light);display:flex;align-items:center;justify-content:center;font-size:18px">🤖</div>
          <div><div class="label">Чат с Loiva</div><div class="desc">Продолжить диалог</div></div>
        </div>
      </div>
    </div>`;
  tabArea.appendChild(homeTab);

  // CHAT
  const chatTab = h('div',{class:'tab-content',id:'tab-chat',hidden:''});
  chatTab.innerHTML = `
    <div class="chat-screen">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <div class="icon">💬</div>
          <p>Начни диалог с Loiva.<br>Напиши, что у тебя на душе.</p>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Напиши сообщение...">
        <button id="chatSend">↑</button>
      </div>
    </div>`;
  tabArea.appendChild(chatTab);

  // TECHNIQUES
  const techTab = h('div',{class:'tab-content',id:'tab-techniques',hidden:''});
  let techHtml = '<div style="padding:16px"><div class="technique-list">';
  techniques.forEach((t,i) => {
    techHtml += `<div class="technique-card" data-tidx="${i}"><h4>${t.icon} ${t.title}</h4><p>${t.desc}</p><span class="tag ${t.tagCls}">${t.tag}</span></div>`;
  });
  techHtml += '</div></div>';
  techTab.innerHTML = techHtml;
  tabArea.appendChild(techTab);

  // PROGRESS
  const progTab = h('div',{class:'tab-content',id:'tab-progress',hidden:''});
  progTab.innerHTML = `
    <div style="padding:16px">
      <div class="streak-card"><div class="streak-num">7</div><div class="streak-label">дней подряд 🔥</div></div>
      <div class="section-title">Привычки</div>
      <div class="habit-list" id="habitList">
        <div class="habit-item done"><div class="habit-check"></div><div class="habit-info"><h4>Утренняя медитация</h4><p>10 минут осознанности</p></div></div>
        <div class="habit-item done"><div class="habit-check"></div><div class="habit-info"><h4>Дыхательная практика</h4><p>5 минут 4-7-8</p></div></div>
        <div class="habit-item"><div class="habit-check"></div><div class="habit-info"><h4>Журнал благодарности</h4><p>3 вещи за сегодня</p></div></div>
        <div class="habit-item"><div class="habit-check"></div><div class="habit-info"><h4>Вечерний возврат</h4><p>Как прошёл день?</p></div></div>
      </div>
      <div class="section-title" style="margin-top:20px">Статистика</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="num" style="color:var(--primary)">23</div><div class="lbl">Дней использования</div></div>
        <div class="stat-card"><div class="num" style="color:var(--accent)">47</div><div class="lbl">Диалогов</div></div>
        <div class="stat-card"><div class="num" style="color:var(--secondary)">12</div><div class="lbl">Техник освоено</div></div>
        <div class="stat-card"><div class="num" style="color:var(--warning)">85%</div><div class="lbl">Выполнение</div></div>
      </div>
    </div>`;
  tabArea.appendChild(progTab);

  // SETTINGS
  const setTab = h('div',{class:'tab-content',id:'tab-settings',hidden:''});
  setTab.innerHTML = `
    <div style="padding:16px">
      <div class="settings-group"><h4>Аккаунт</h4>
        <div class="settings-item"><span class="icon">👤</span><span class="label">Профиль</span><span class="arrow">›</span></div>
        <div class="settings-item"><span class="icon">🔑</span><span class="label">API ключи ИИ</span><span class="arrow">›</span></div>
      </div>
      <div class="settings-group"><h4>Приложение</h4>
        <div class="settings-item"><span class="icon">🎨</span><span class="label">Внешний вид</span><span class="arrow">›</span></div>
        <div class="settings-item"><span class="icon">🌍</span><span class="label">Язык</span><span class="arrow">›</span></div>
        <div class="settings-item"><span class="icon">🔔</span><span class="label">Уведомления</span><span class="arrow">›</span></div>
      </div>
      <div class="settings-group"><h4>Данные</h4>
        <div class="settings-item"><span class="icon">💾</span><span class="label">Экспорт данных</span><span class="arrow">›</span></div>
        <div class="settings-item" onclick="localStorage.removeItem('${LS_KEY}');location.reload()"><span class="icon">🔄</span><span class="label">Повторить онбординг</span><span class="arrow">›</span></div>
      </div>
      <div class="settings-group"><h4>О приложении</h4>
        <div class="settings-item"><span class="icon">📱</span><span class="label">Версия</span><span class="arrow" style="color:var(--text-sec)">0.1.0</span></div>
      </div>
    </div>`;
  tabArea.appendChild(setTab);

  // Technique detail overlay
  const detail = h('div',{class:'detail-overlay',id:'techDetail'});
  detail.innerHTML = `<div class="detail-header"><button class="back" id="techBack">←</button><h2 id="techTitle"></h2></div><div class="detail-body" id="techBody"></div>`;
  tabArea.appendChild(detail);

  wrap.appendChild(tabArea);

  // Bottom nav
  const nav = h('div',{class:'bottom-nav'});
  const tabs = [{id:'tab-home',icon:'🏠',label:'Главная'},{id:'tab-chat',icon:'💬',label:'Чат'},{id:'tab-techniques',icon:'🧘',label:'Техники'},{id:'tab-progress',icon:'📊',label:'Прогресс'},{id:'tab-settings',icon:'⚙️',label:'Настройки'}];
  tabs.forEach((t,i) => {
    const ni = h('div',{class:'nav-item'+(i===0?' active':'')});
    ni.innerHTML = `<span class="nav-icon">${t.icon}</span><span class="nav-label">${t.label}</span>`;
    ni.addEventListener('click', () => switchTab(t.id));
    nav.appendChild(ni);
  });
  wrap.appendChild(nav);
  app.appendChild(wrap);

  // Habits toggle
  $('habitList')?.addEventListener('click', e => {
    const item = e.target.closest('.habit-item');
    if (item) item.classList.toggle('done');
  });

  // Chat
  let chatStarted = false;
  $('chatSend').addEventListener('click', doSend);
  $('chatInput').addEventListener('keypress', e => { if (e.key==='Enter') doSend(); });
  function doSend() {
    const inp = $('chatInput');
    const msg = inp.value.trim();
    if (!msg) return;
    if (!chatStarted) {
      $('chatEmpty')?.remove();
      chatStarted = true;
    }
    const box = $('chatMessages');
    box.insertAdjacentHTML('beforeend',`<div class="msg user">${esc(msg)}</div>`);
    inp.value = '';
    box.insertAdjacentHTML('beforeend',`<div class="typing" id="typing"><span></span><span></span><span></span></div>`);
    box.scrollTop = box.scrollHeight;
    setTimeout(() => {
      $('typing')?.remove();
      const resp = aiResponses[Math.floor(Math.random()*aiResponses.length)];
      box.insertAdjacentHTML('beforeend',`<div class="msg ai"><div class="mode">general</div>${resp}</div>`);
      box.scrollTop = box.scrollHeight;
    }, 1200);
  }

  // Technique cards
  techTab.querySelectorAll('.technique-card').forEach(card => {
    card.addEventListener('click', () => {
      const t = techniques[parseInt(card.dataset.tidx)];
      $('techTitle').textContent = t.icon + ' ' + t.title;
      let bh = `<h3>${t.title}</h3><p>${t.full}</p>`;
      t.steps.forEach((s,i) => { bh += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`; });
      $('techBody').innerHTML = bh;
      $('techDetail').classList.add('open');
    });
  });
  $('techBack').addEventListener('click', () => $('techDetail').classList.remove('open'));

  // Nav card clicks
  wrap.querySelectorAll('[data-tab]').forEach(card => {
    card.addEventListener('click', () => switchTab(card.dataset.tab));
  });
}

function switchTab(id) {
  app.querySelectorAll('.tab-content').forEach(t => { t.hidden = true; });
  const target = $(id);
  if (target) target.hidden = false;
  app.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const tabs = ['tab-home','tab-chat','tab-techniques','tab-progress','tab-settings'];
  const idx = tabs.indexOf(id);
  if (idx >= 0) app.querySelectorAll('.nav-item')[idx].classList.add('active');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// INIT
if (onboardingDone) renderApp(); else renderOnboarding();
</script>
</body>
</html>
