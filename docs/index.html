<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B1020">
<title>Loiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0B1020;--bg2:#111A2B;--sf:#172237;--sf2:#1E2B43;--pr:#79C7C3;--sc:#AAA7E8;--ac:#79C69A;--tx:#F4F7FA;--tx2:#AAB6C6;--mu:#495670;--dn:#E27C88;--wn:#E2B66F;--bd:#2A3850;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);--nv:64px}
html,body{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
.app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
@media(min-width:481px){.app{border-left:1px solid var(--bd);border-right:1px solid var(--bd)}}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s;transform:translateX(12px);z-index:1}
.scr.on{opacity:1;visibility:visible;transform:none;z-index:2}
.ob{justify-content:center;align-items:center;padding:28px 20px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ob .bk{position:absolute;top:calc(10px + var(--st));left:12px;background:none;border:none;color:var(--tx2);font-size:26px;cursor:pointer;padding:8px;z-index:5}
.ob h1{font-size:36px;font-weight:700;margin-bottom:6px;color:var(--pr)}
.ob h2{font-size:22px;font-weight:700;margin-bottom:8px}
.ob p{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:24px;max-width:320px}
.ob .ico{font-size:48px;margin-bottom:12px}
.w{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;width:100%;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.b1{background:var(--pr);color:#0B1020}
.b2{background:transparent;color:var(--tx);border:1.5px solid var(--bd)}
.dt{display:flex;gap:6px;margin-top:18px;justify-content:center}
.dt i{width:7px;height:7px;border-radius:50%;background:var(--mu);transition:all .3s;display:block}
.dt i.on{background:var(--pr);width:20px;border-radius:4px}
.ab{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.ab button{padding:18px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-size:14px;font-weight:500;color:var(--tx);font-family:inherit;transition:border-color .2s}
.ab button.sel{border-color:var(--pr);background:var(--sf2)}
.ab button .e{font-size:28px;margin-bottom:6px;display:block}
.lg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.lg button{padding:16px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-family:inherit;transition:border-color .2s;color:var(--tx)}
.lg button.sel{border-color:var(--pr)}
.lg button .f{font-size:26px;margin-bottom:4px;display:block}
.lg button .n{font-size:13px;font-weight:500}
.cl{width:100%;max-height:280px;overflow-y:auto;margin-bottom:16px;text-align:left}
.cl div{padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px;transition:background .15s}
.cl div:hover,.cl div.sel{background:var(--sf)}
.tr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 0;border-bottom:1px solid var(--bd)}
.tr:last-child{border:none}
.tr span{font-size:14px}
.tg{width:46px;height:26px;border-radius:13px;background:var(--mu);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tg.on{background:var(--pr)}
.tg::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tg.on::after{transform:translateX(20px)}
.ch{display:flex;flex-wrap:wrap;gap:8px;width:100%;justify-content:center}
.ch button{padding:10px 16px;border-radius:20px;background:var(--sf);border:1.5px solid transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--tx);transition:border-color .2s}
.ch button.sel{border-color:var(--pr);background:var(--sf2)}
.tb{padding:calc(6px + var(--st)) 16px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg);z-index:5;border-bottom:1px solid rgba(255,255,255,.04)}
.tb h2{font-size:17px;font-weight:700;flex:1}
.tb .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--sc));display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.tb .ai{font-size:10px;font-weight:700;background:var(--sc);color:#0B1020;padding:2px 6px;border-radius:6px;margin-right:4px}
.tb .md{font-size:10px;color:var(--tx2);margin-left:auto;margin-right:8px}
.ta{flex:1;overflow:hidden;position:relative}
.tb2{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nv) + var(--sb) + 16px)}
.tb2[hidden]{display:none}
.bn{position:relative;flex-shrink:0;height:calc(var(--nv) + var(--sb));padding-bottom:var(--sb);background:var(--sf);border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:10}
.bi{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:6px 4px;flex:1}
.bi .ic{font-size:20px;opacity:.4;transition:opacity .2s;line-height:1}
.bi .lb{font-size:9px;color:var(--mu);font-weight:500;transition:color .2s}
.bi.on .ic{opacity:1}
.bi.on .lb{color:var(--pr);font-weight:600}
.gp{padding:16px}
.gp h3{font-size:18px;font-weight:700;margin-bottom:2px}
.gp p{font-size:13px;color:var(--tx2)}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:16px}
.qa .ac{padding:14px 12px;border-radius:14px;background:var(--sf);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.qa .ac:active{border-color:var(--pr)}
.qa .ac .em{font-size:22px;margin-bottom:6px}
.qa .ac .lb{font-size:12px;font-weight:600}
.qa .ac .ds{font-size:10px;color:var(--tx2);margin-top:2px}
.ci{margin:0 16px 16px;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--sf),var(--sf2));border:1px solid var(--bd)}
.ci h4{font-size:14px;font-weight:600;margin-bottom:12px}
.cr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cr:last-child{margin-bottom:0}
.cr .cl2{font-size:12px;color:var(--tx2);width:70px;flex-shrink:0}
.cs{display:flex;gap:4px;flex:1}
.cd{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--tx2)}
.cd.sel{background:var(--pr);border-color:var(--pr);color:#0B1020}
.cn{width:100%;padding:10px;border-radius:10px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font-size:13px;font-family:inherit;resize:none;outline:none;margin-top:8px}
.cn:focus{border-color:var(--pr)}
.se{padding:0 16px;margin-bottom:16px}
.st{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px;padding-left:2px}
.cc{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--sf);cursor:pointer;margin-bottom:6px}
.cc .em{font-size:20px;width:36px;height:36px;border-radius:10px;background:var(--sf2);display:flex;align-items:center;justify-content:center}
.cc .inf .lb{font-size:13px;font-weight:600}
.cc .inf .ds{font-size:11px;color:var(--tx2)}
.dy{padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(121,199,195,.08),rgba(170,167,232,.08));border:1px solid var(--bd);margin:0 16px 16px;cursor:pointer}
.dy h4{font-size:14px;font-weight:600;margin-bottom:4px}
.dy p{font-size:12px;color:var(--tx2)}
.cr2{margin:0 16px 16px;padding:14px;border-radius:14px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2)}
.cr2 h4{font-size:13px;font-weight:600;color:var(--dn);margin-bottom:4px}
.cr2 p{font-size:12px;color:var(--tx2);line-height:1.5}
.cr2 a{color:var(--dn);font-weight:600}
.chat{display:flex;flex-direction:column;height:100%}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.m{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.55;animation:fi .25s}
.m.u{align-self:flex-end;background:var(--pr);color:#0B1020;border-bottom-right-radius:4px}
.m.a{align-self:flex-start;background:var(--sf);border-bottom-left-radius:4px}
.m .md{font-size:9px;color:var(--pr);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.m .act{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.m .act button{padding:5px 10px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:inherit}
.ce{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx2);text-align:center;padding:20px}
.ce .em{font-size:40px;margin-bottom:10px;opacity:.5}
.ce p{font-size:13px;line-height:1.5}
.ci2{padding:8px 12px calc(8px + var(--sb));border-top:1px solid var(--bd);display:flex;gap:8px;align-items:center;background:var(--bg);flex-shrink:0}
.ci2 input{flex:1;padding:11px 14px;border-radius:22px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:14px;outline:none;font-family:inherit}
.ci2 input:focus{border-color:var(--pr)}
.ci2 button{width:38px;height:38px;border-radius:50%;background:var(--pr);border:none;color:#0B1020;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700}
.tp{display:flex;gap:4px;padding:11px 14px;background:var(--sf);border-radius:14px;align-self:flex-start;width:fit-content}
.tp span{width:6px;height:6px;border-radius:50%;background:var(--mu);animation:an 1.2s infinite}
.tp span:nth-child(2){animation-delay:.15s}
.tp span:nth-child(3){animation-delay:.3s}
.tl{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.tc{padding:14px;border-radius:14px;background:var(--sf);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.tc:active{border-color:var(--pr)}
.tc h4{font-size:14px;font-weight:600;margin-bottom:3px}
.tc p{font-size:12px;color:var(--tx2);line-height:1.4}
.tc .dur{font-size:11px;color:var(--mu);margin-top:4px}
.tg2{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block;margin-top:6px;margin-right:4px}
.tg2.b{background:rgba(121,199,195,.12);color:var(--pr)}
.tg2.g{background:rgba(121,198,154,.12);color:var(--ac)}
.det{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s ease}
.det.open{transform:none}
.dh{padding:calc(10px + var(--st)) 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.dh .bk{background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer;padding:4px}
.dh h2{font-size:16px;font-weight:600;flex:1}
.db{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.db h3{font-size:17px;font-weight:700;margin-bottom:6px}
.db .meta{font-size:12px;color:var(--tx2);margin-bottom:12px;display:flex;gap:12px}
.db p{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:14px}
.db .stp{padding:12px;border-radius:12px;background:var(--sf);margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.db .sn{width:26px;height:26px;border-radius:50%;background:var(--pr);color:#0B1020;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.db .st2{font-size:13px;line-height:1.5}
.db .caut{padding:12px;border-radius:12px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2);margin:12px 0;font-size:12px;color:var(--dn);line-height:1.5}
.cm{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.cm .br{width:160px;height:160px;border-radius:50%;border:3px solid var(--pr);display:flex;align-items:center;justify-content:center;margin-bottom:24px;opacity:.7;transition:transform 4s ease-in-out}
.cm .br.inh{transform:scale(1.3)}
.cm .br.exh{transform:scale(1)}
.cm .bt{font-size:14px;color:var(--pr);font-weight:600}
.cm .ti{font-size:48px;font-weight:700;color:var(--tx2);margin-bottom:20px;font-variant-numeric:tabular-nums}
.cm .db2{display:flex;gap:8px;margin-bottom:20px}
.cm .db2 button{padding:8px 16px;border-radius:20px;background:var(--sf);border:1.5px solid var(--bd);color:var(--tx);font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.cm .db2 button.sel{border-color:var(--pr);color:var(--pr)}
.cm .ctrl{display:flex;gap:12px}
.cm .ctrl button{padding:12px 28px;border-radius:14px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.cm .cs2{background:var(--pr);color:#0B1020}
.cm .cs3{background:var(--sf);color:var(--tx)}
.cm .gr{margin-top:24px;padding:16px;border-radius:14px;background:var(--sf);width:100%;max-width:340px;text-align:left}
.cm .gr h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--pr)}
.cm .gr li{font-size:12px;color:var(--tx2);margin-bottom:4px;line-height:1.5}
.prg{padding:16px}
.sk{padding:20px;border-radius:16px;background:linear-gradient(135deg,var(--sf),var(--sf2));text-align:center;margin-bottom:16px}
.sk .n{font-size:48px;font-weight:700;color:var(--pr);line-height:1}
.sk .lb{font-size:12px;color:var(--tx2);margin-top:4px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cg div{width:100%;aspect-ratio:1;border-radius:6px;background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx2)}
.cg div.f{background:var(--pr);color:#0B1020;font-weight:600}
.cg div.h{background:rgba(121,199,195,.3);color:var(--tx)}
.hl{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.hi{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--sf);cursor:pointer}
.hi:active{opacity:.8}
.hi .ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--mu);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hi.dn .ck{background:var(--pr);border-color:var(--pr)}
.hi.dn .ck::after{content:'\2713';color:#0B1020;font-size:12px;font-weight:700}
.hi .inf h4{font-size:13px;font-weight:600}
.hi .inf p{font-size:11px;color:var(--tx2)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sg div{padding:14px;border-radius:12px;background:var(--sf);text-align:center}
.sg div .n{font-size:22px;font-weight:700}
.sg div .l{font-size:10px;color:var(--tx2);margin-top:2px}
.stg{padding:16px}
.sgp{margin-bottom:18px}
.sgp h4{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding-left:2px}
.si{display:flex;align-items:center;gap:10px;padding:12px;background:var(--sf);margin-bottom:1px;cursor:pointer;transition:background .15s}
.si:first-child{border-radius:12px 12px 2px 2px}
.si:last-child{border-radius:2px 2px 12px 12px}
.si:only-child{border-radius:12px}
.si:active{background:var(--sf2)}
.si .em{font-size:16px;width:20px;text-align:center}
.si .lb{flex:1;font-size:14px}
.si .ar{color:var(--mu);font-size:12px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes an{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
</style>
</head>
<body>
<div class="app" id="A"></div>
<script>
var A=document.getElementById('A'),K='loiva_v2',cur=null;

function go(id){
var el=document.getElementById(id);
if(!el)return;
var all=document.querySelectorAll('.scr');
for(var i=0;i<all.length;i++)all[i].classList.remove('on');
el.classList.add('on');
}

function sel(el){
var p=el.parentElement;
var c=p.children;
for(var i=0;i<c.length;i++)c[i].classList.remove('sel');
el.classList.add('sel');
}

function tgl(el){el.classList.toggle('on')}

function done(){if(window._busy)return;window._busy=1;localStorage.setItem(K,'1');buildApp()}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* TECHNIQUE DATA - flat object lookup */

'Дыхание':{icon:'\uD83E\uDEC1',dur:'2-3 мин',tags:['Дыхание'],desc:'Плавно замедли дыхание.',caution:'Не задерживай дыхание принудительно.',steps:['Сядь удобно','Дыши обычно 30 сек','Удлиняй выдох на 1-2 счёта','Продолжай 2-3 минуты']},
