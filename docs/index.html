<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B1020">
<title>Loiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B1020;--sf:#172237;--sf2:#1E2B43;--pr:#79C7C3;--sc:#AAA7E8;--ac:#79C69A;--tx:#F4F7FA;--tx2:#AAB6C6;--mu:#495670;--dn:#E27C88;--wn:#E2B66F;--bd:#2A3850;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
#A{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;visibility:hidden;transition:opacity .25s;z-index:1}
.scr.on{opacity:1;visibility:visible;z-index:2}
.ob{justify-content:center;align-items:center;padding:28px 20px;text-align:center;overflow-y:auto}
.ob .bk{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--tx2);font-size:26px;cursor:pointer;padding:8px}
.ob h1{font-size:36px;font-weight:700;margin-bottom:6px;color:var(--pr)}
.ob h2{font-size:22px;font-weight:700;margin-bottom:8px}
.ob p{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:20px;max-width:320px}
.w{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;width:100%;font-family:inherit}
.b1{background:var(--pr);color:#0B1020}
.b2{background:transparent;color:var(--tx);border:1.5px solid var(--bd)}
.dt{display:flex;gap:6px;margin-top:18px;justify-content:center}
.dt i{width:7px;height:7px;border-radius:50%;background:var(--mu);display:inline-block}
.dt i.on{background:var(--pr);width:20px;border-radius:4px}
.ab{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.ab button{padding:18px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-size:14px;font-weight:500;color:var(--tx);font-family:inherit}
.ab button .e{font-size:28px;margin-bottom:6px;display:block}
.lg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.lg button{padding:16px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-family:inherit;color:var(--tx)}
.lg button.sel{border-color:var(--pr)}
.lg button .f{font-size:26px;margin-bottom:4px;display:block}
.cl{width:100%;max-height:280px;overflow-y:auto;margin-bottom:16px;text-align:left}
.cl div{padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px}
.cl div.sel{background:var(--sf)}
.tr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 0;border-bottom:1px solid var(--bd)}
.tr:last-child{border:none}
.tr span{font-size:14px}
.tg{width:46px;height:26px;border-radius:13px;background:var(--mu);position:relative;cursor:pointer;flex-shrink:0}
.tg.on{background:var(--pr)}
.tg::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tg.on::after{transform:translateX(20px)}
.chips{display:flex;flex-wrap:wrap;gap:8px;width:100%;justify-content:center}
.chips button{padding:10px 16px;border-radius:20px;background:var(--sf);border:1.5px solid transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--tx)}
.chips button.sel{border-color:var(--pr);background:var(--sf2)}
</style>
</head>
<body>
<div id="A"></div>
<script>
(function(){
var A=document.getElementById('A');
var K='loiva_v3';
var busy=0;

function $(id){return document.getElementById(id)}
function sel(el){var p=el.parentElement;for(var i=0;i<p.children.length;i++)p.children[i].classList.remove('sel');el.classList.add('sel')}
window.sel=sel;
function tgl(el){el.classList.toggle('on')}
window.tgl=tgl;
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function goScreen(id){
var els=A.querySelectorAll('.scr');
for(var i=0;i<els.length;i++)els[i].classList.remove('on');
var t=$(id);if(t)t.classList.add('on');
}
window.goScreen=goScreen;

function enterApp(){
if(busy)return;busy=1;
try{
localStorage.setItem(K,'1');
buildMain();
}catch(e){
A.innerHTML='<div style="padding:20px;color:white"><h2>Error in buildMain</h2><pre>'+esc(e.message)+'\n'+esc(e.stack)+'</pre></div>';
}
}
window.enterApp=enterApp;

function buildMain(){
A.innerHTML='';
var w=document.createElement('div');
w.style.cssText='display:flex;flex-direction:column;height:100%;position:relative';

/* TABS */
var tabs=['home','chat','tech','calm','prog','set'];
var tabData={
home:'<div style="padding:16px"><h3 style="font-size:18px;margin-bottom:12px">Что полезно сейчас?</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px"><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😰</div><div style="font-size:12px;font-weight:600">Тревожно</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😰</div><div style="font-size:12px;font-weight:600">Стресс</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😔</div><div style="font-size:12px;font-weight:600">Тяжело</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">🗣</div><div style="font-size:12px;font-weight:600">Выговориться</div></div><div class="ac" onclick="mSw(\'tech\')"><div style="font-size:22px;margin-bottom:4px">🧘</div><div style="font-size:12px;font-weight:600">Практика</div></div><div class="ac" onclick="mSw(\'calm\')"><div style="font-size:22px;margin-bottom:4px">🌙</div><div style="font-size:12px;font-weight:600">Calm Room</div></div></div><div style="padding:14px;border-radius:14px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2);margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:var(--dn)">🆘 Нужна помощь?</div><div style="font-size:12px;color:var(--tx2);margin-top:4px">Позвони: <a href="tel:8-800-2000-122" style="color:var(--dn)">8-800-2000-122</a></div></div></div>',
chat:'<div style="display:flex;flex-direction:column;height:100%"><div style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px" id="mMsgs"><div style="text-align:center;color:var(--tx2);padding:40px 20px"><div style="font-size:36px;margin-bottom:8px;opacity:.5">💬</div><p style="font-size:13px">Начни диалог с Loiva</p></div></div><div style="padding:8px 12px;border-top:1px solid var(--bd);display:flex;gap:8px"><input id="mInp" style="flex:1;padding:11px 14px;border-radius:22px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:14px;outline:none;font-family:inherit" placeholder="Напиши..."><button onclick="mSend()" style="width:38px;height:38px;border-radius:50%;background:var(--pr);border:none;color:#0B1020;font-size:18px;cursor:pointer;font-weight:700">↑</button></div></div>',
tech:'<div style="padding:12px;display:flex;flex-direction:column;gap:8px" id="mTech"></div>',
calm:'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center"><div id="mBreath" style="width:140px;height:140px;border-radius:50%;border:3px solid var(--pr);display:flex;align-items:center;justify-content:center;margin-bottom:20px;transition:transform 4s"><span id="mBrT" style="color:var(--pr);font-weight:600">Готов</span></div><div id="mTimer" style="font-size:42px;font-weight:700;color:var(--tx2);margin-bottom:16px">5:00</div><div style="display:flex;gap:8px;margin-bottom:16px"><button class="cBtn" onclick="mDur(this,1)">1 мин</button><button class="cBtn" onclick="mDur(this,3)">3 мин</button><button class="cBtn sel" onclick="mDur(this,5)">5 мин</button><button class="cBtn" onclick="mDur(this,10)">10 мин</button></div><div style="display:flex;gap:12px"><button id="mStart" onclick="mStartCalm()" style="padding:12px 28px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--pr);color:#0B1020;cursor:pointer">Начать</button><button id="mStop" onclick="mStopCalm()" style="padding:12px 28px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--sf);color:var(--tx);cursor:pointer;display:none">Стоп</button></div></div>',
prog:'<div style="padding:16px"><div style="padding:20px;border-radius:16px;background:linear-gradient(135deg,var(--sf),var(--sf2));text-align:center;margin-bottom:16px"><div style="font-size:48px;font-weight:700;color:var(--pr)">7</div><div style="font-size:12px;color:var(--tx2)">дней подряд</div></div><div style="font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px">Привычки</div><div id="mHab"></div></div>',
set:'<div style="padding:16px"><div style="margin-bottom:18px"><div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Общие</div><div class="si">🌍 Язык <span style="color:var(--mu)">Русский ›</span></div><div class="si">🏳 Страна <span style="color:var(--mu)">Россия ›</span></div></div><div style="margin-bottom:18px"><div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">AI</div><div class="si">🤖 Режим <span style="color:var(--mu)">Listen ›</span></div><div class="si">🧠 Память <span style="color:var(--mu)">Вкл ›</span></div></div><div style="margin-bottom:18px"><div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Данные</div><div class="si" onclick="localStorage.removeItem(\''+K+'\');location.reload()">🔄 Повторить онбординг <span style="color:var(--mu)">›</span></div></div></div>'
};

var tb=document.createElement('div');
tb.style.cssText='padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)';
tb.innerHTML='<h2 style="font-size:17px;font-weight:700;flex:1">Loiva</h2><span style="font-size:10px;font-weight:700;background:var(--sc);color:#0B1020;padding:2px 6px;border-radius:6px">AI</span><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--sc));display:flex;align-items:center;justify-content:center;font-size:14px">👤</div>';
w.appendChild(tb);

var ta=document.createElement('div');
ta.style.cssText='flex:1;overflow:hidden;position:relative';

tabs.forEach(function(t){
var d=document.createElement('div');
d.id='mt-'+t;
d.style.cssText='position:absolute;inset:0;overflow-y:auto;padding-bottom:80px';
d.hidden=true;
d.innerHTML=tabData[t]||'';
ta.appendChild(d);
});

w.appendChild(ta);

var bn=document.createElement('div');
bn.style.cssText='flex-shrink:0;height:64px;background:var(--sf);border-top:1px solid rgba(255,255,255,.06);display:flex';
var navItems=[['home','🏠','Главная'],['chat','💬','Чат'],['tech','🧘','Практики'],['calm','🌙','Calm'],['prog','📊','Динамика'],['set','⚙️','Настройки']];
navItems.forEach(function(n,i){
var bi=document.createElement('div');
bi.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;flex:1';
bi.dataset.tab=n[0];
bi.innerHTML='<span style="font-size:20px;opacity:'+(i===0?'1':'.4')+'">'+n[1]+'</span><span style="font-size:9px;color:'+(i===0?'var(--pr)':'var(--mu)')+';font-weight:'+(i===0?'600':'500')+'">'+n[2]+'</span>';
bi.onclick=function(){mSw(n[0])};
bn.appendChild(bi);
});
w.appendChild(bn);
A.appendChild(w);

/* Populate technique list */
var techData=[
{cat:'Тревожные мысли',items:[
{icon:'🧊',name:'5-4-3-2-1 Заземление',dur:'3-5 мин',desc:'Вернись в момент через органы чувств.',caution:'Не закрывай глаза если это усиливает тревогу.',steps:['Назови 5 вещей которые ВИДИШЬ','Назови 4 вещи которые можешь ПОТРОГАТЬ','Назови 3 вещи которые СЛЫШИШЬ','Назови 2 вещи которые можешь ЗАПАХНУТЬ','Назови 1 вещь на ВКУС']},
{icon:'📝',name:'Факты и предположения',dur:'5-7 мин',desc:'Отдели известное от предположений.',caution:null,steps:['Запиши ситуацию одним предложением','Что знаешь НАВЕРНЯКА?','Что ПРЕДПОЛАГАЕШЬ?','Есть ли альтернативы?','Какая мысль более реалистичная?']},
{icon:'🎯',name:'Зона контроля',dur:'3-5 мин',desc:'Что зависит от тебя, а что нет.',caution:null,steps:['Напиши ситуацию','Раздели: МОЁ / НЕ МОЁ','Для МОЁ - одно действие','Для НЕ МОЁ - принять']}
]},
{cat:'Стресс',items:[
{icon:'🫁',name:'Мягкое дыхание',dur:'2-3 мин',desc:'Плавно замедли дыхание.',caution:'Не задерживай дыхание принудительно.',steps:['Сядь удобно','Дыши обычно 30 сек','Удлиняй выдох на 1-2 счёта','Продолжай 2-3 минуты']},
{icon:'📦',name:'Следующий шаг',dur:'2-5 мин',desc:'Самое маленькое действие сейчас.',caution:null,steps:['Что можно за 2 минуты?','Это реалистично?','Готов? Сделай.']}
]},
{cat:'Сниженное настроение',items:[
{icon:'💛',name:'Маленький шаг',dur:'2-5 мин',desc:'Минимальное действие.',caution:null,steps:['Что полезно?','Мало энергии?','Сделай.']},
{icon:'🤝',name:'Самосострадание',dur:'3-5 мин',desc:'Доброта к себе как к другу.',caution:null,steps:['Что бы сказал другу?','Скажи себе.']}
]},
{cat:'Кризис',items:[
{icon:'🆘',name:'Crisis Grounding',dur:'3-5 мин',desc:'Быстрая помощь при панике.',caution:'При реальной опасности звони 112.',steps:['Скажи: это паника, она пройдёт','Возьми холодный предмет','Назови где ты, какой день','Не помогает? Звони 8-800-2000-122']}
]}
];

var techEl=$('mTech');
if(techEl){
techData.forEach(function(cat){
var hd=document.createElement('div');
hd.style.cssText='font-size:12px;font-weight:700;color:var(--pr);text-transform:uppercase;letter-spacing:.8px;padding:8px 2px 4px';
hd.textContent=cat.cat;
techEl.appendChild(hd);
cat.items.forEach(function(t){
var card=document.createElement('div');
card.className='tc';
card.innerHTML='<h4 style="font-size:14px;font-weight:600;margin-bottom:3px">'+t.icon+' '+t.name+'</h4><p style="font-size:12px;color:var(--tx2);line-height:1.4">'+t.desc+'</p><div style="font-size:11px;color:var(--mu);margin-top:4px">⏱ '+t.dur+'</div>';
card.onclick=function(){openDetail(t)};
techEl.appendChild(card);
});
});
}

/* Habits */
var habEl=$('mHab');
if(habEl){
var habits=[{name:'Утренняя медитация',done:true},{name:'Дыхательная практика',done:true},{name:'Журнал благодарности',done:false},{name:'Вечерний возврат',done:false}];
habits.forEach(function(h){
var d=document.createElement('div');
d.className='hi'+(h.done?' dn':'');
d.innerHTML='<div class="ck"></div><div style="flex:1"><div style="font-size:13px;font-weight:600">'+h.name+'</div></div>';
d.onclick=function(){this.classList.toggle('dn')};
habEl.appendChild(d);
});
}

/* Chat responses */
var aiResp=['Я тебя слышу. Расскажи подробнее.','Спасибо, что делишься.','Это нормально чувствовать так.','Я здесь рядом.','Хочешь попробовать заземление?','Как давно ты так себя чувствуешь?','Это смело — говорить об этом.','Давай сделаем вдох вместе.','Что бы ты хотела сделать сейчас?'];
var chatStarted=false;
window.mSend=function(){
var inp=$('mInp');if(!inp)return;
var msg=inp.value.trim();if(!msg)return;
if(!chatStarted){var e=$('mMsgs');if(e)e.innerHTML='';chatStarted=true}
var box=$('mMsgs');
box.insertAdjacentHTML('beforeend','<div class="m u">'+esc(msg)+'</div>');
inp.value='';
box.insertAdjacentHTML('beforeend','<div class="tp" id="mt"><span></span><span></span><span></span></div>');
box.scrollTop=box.scrollHeight;
setTimeout(function(){var t=$('mt');if(t)t.remove();var r=aiResp[Math.floor(Math.random()*aiResp.length)];box.insertAdjacentHTML('beforeend','<div class="m a"><div style="font-size:9px;color:var(--pr);font-weight:700;text-transform:uppercase;margin-bottom:3px">listen</div>'+r+'</div>');box.scrollTop=box.scrollHeight},1200);
};
if($('mInp'))$('mInp').onkeypress=function(e){if(e.key==='Enter')mSend()};

/* Tab switching */
window.mSw=function(id){
var allTabs=A.querySelectorAll('[id^="mt-"]');
for(var i=0;i<allTabs.length;i++)allTabs[i].hidden=true;
var target=$('mt-'+id);if(target)target.hidden=false;
var bis=bn.querySelectorAll('[data-tab]');
for(var i=0;i<bis.length;i++){
var active=bis[i].dataset.tab===id;
bis[i].children[0].style.opacity=active?'1':'.4';
bis[i].children[1].style.color=active?'var(--pr)':'var(--mu)';
bis[i].children[1].style.fontWeight=active?'600':'500';
}
};
}

/* Technique detail */
function openDetail(t){
var overlay=document.createElement('div');
overlay.style.cssText='position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column';
var hdr=document.createElement('div');
hdr.style.cssText='padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.04)';
hdr.innerHTML='<button onclick="this.closest(\'div[style]\').remove()" style="background:none;border:none;color:var(--tx);font-size:22px;cursor:pointer">←</button><h2 style="font-size:16px;font-weight:600;flex:1">'+t.icon+' '+t.name+'</h2>';
overlay.appendChild(hdr);
var body=document.createElement('div');
body.style.cssText='flex:1;overflow-y:auto;padding:16px';
var html='<div style="font-size:12px;color:var(--tx2);margin-bottom:12px">⏱ '+t.dur+'</div><p style="font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:14px">'+t.desc+'</p>';
if(t.caution)html+='<div style="padding:12px;border-radius:12px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2);margin:12px 0;font-size:12px;color:var(--dn);line-height:1.5">⚠️ '+t.caution+'</div>';
t.steps.forEach(function(s,i){html+='<div style="padding:12px;border-radius:12px;background:var(--sf);margin-bottom:8px;display:flex;gap:10px"><div style="width:26px;height:26px;border-radius:50%;background:var(--pr);color:#0B1020;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">'+(i+1)+'</div><div style="font-size:13px;line-height:1.5">'+s+'</div></div>'});
html+='<div style="margin-top:16px"><button class="btn b1" onclick="this.closest(\'div[style]\').remove()">Завершить</button></div>';
body.innerHTML=html;
overlay.appendChild(body);
A.appendChild(overlay);
}
window.openDetail=openDetail;

/* Calm Room */
var calmSec=300,calmIv=null,breathIv=null;
window.mDur=function(el,m){
var p=el.parentElement;for(var i=0;i<p.children.length;i++)p.children[i].classList.remove('sel');
el.classList.add('sel');calmSec=m*60;uTimer();
};
function uTimer(){var m=Math.floor(calmSec/60),s=calmSec%60;var el=$('mTimer');if(el)el.textContent=m+':'+(s<10?'0':'')+s}
window.mStartCalm=function(){
var ms=$('mStart'),msp=$('mStop');if(ms)ms.style.display='none';if(msp)msp.style.display='';
breathIv=setInterval(function(){var b=$('mBreath'),t=$('mBrT');if(!b)return;if(b.style.transform==='scale(1.3)'){b.style.transform='scale(1)';if(t)t.textContent='Выдох...'}else{b.style.transform='scale(1.3)';if(t)t.textContent='Вдох...'}},4000);
calmIv=setInterval(function(){if(calmSec<=0){mStopCalm();return}calmSec--;uTimer()},1000);
};
window.mStopCalm=function(){
clearInterval(calmIv);clearInterval(breathIv);
