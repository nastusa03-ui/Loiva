<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1020">
<title>Loiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0B1020;--bg2:#111A2B;--surface:#172237;--surface2:#1E2B43;
--primary:#79C7C3;--secondary:#AAA7E8;--accent:#79C69A;
--text:#F4F7FA;--text2:#AAB6C6;--muted:#495670;
--danger:#E27C88;--warn:#E2B66F;--border:#2A3850;
--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
--nav:64px;
}
html,body{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
@media(min-width:481px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}

/* === SCREEN SYSTEM === */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;visibility:hidden;transition:opacity .25s,transform .25s;transform:translateX(12px);z-index:1}
.scr.on{opacity:1;visibility:visible;transform:none;z-index:2}
.scr.off{transform:translateX(-12px);opacity:0}

/* === ONBOARD === */
.ob{justify-content:center;align-items:center;padding:28px 20px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ob .bk{position:absolute;top:calc(10px + var(--safe-t));left:12px;background:none;border:none;color:var(--text2);font-size:26px;cursor:pointer;padding:8px;z-index:5}
.ob h1{font-size:36px;font-weight:700;margin-bottom:6px;color:var(--primary)}
.ob h2{font-size:22px;font-weight:700;margin-bottom:8px}
.ob p{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px;max-width:320px}
.ob .ico{font-size:48px;margin-bottom:12px}
.ob .sub{font-size:13px;color:var(--text2);font-style:italic;margin-top:-16px;margin-bottom:20px}
.wrap{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;width:100%;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn1{background:var(--primary);color:#0B1020}
.btn2{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn2:active{border-color:var(--primary)}
.btns{display:flex;gap:10px;width:100%;margin-top:10px}
.btns .btn{flex:1}
.dots{display:flex;gap:6px;margin-top:18px;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s}
.dot.on{background:var(--primary);width:20px;border-radius:4px}

/* Age gate */
.age-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.age-btn{padding:18px;border-radius:14px;background:var(--surface);border:2px solid transparent;cursor:pointer;text-align:center;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;transition:border-color .2s}
.age-btn.sel{border-color:var(--primary);background:var(--surface2)}
.age-btn .em{font-size:28px;margin-bottom:6px}

/* Lang */
.langs{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.lang{padding:16px;border-radius:14px;background:var(--surface);border:2px solid transparent;cursor:pointer;text-align:center;font-family:inherit;transition:border-color .2s;color:var(--text)}
.lang.sel{border-color:var(--primary)}
.lang .fl{font-size:26px;margin-bottom:4px}
.lang .nm{font-size:13px;font-weight:500}

/* Country */
.country-list{width:100%;max-height:280px;overflow-y:auto;margin-bottom:16px;text-align:left}
.country-item{padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;transition:background .15s}
.country-item:hover,.country-item.sel{background:var(--surface)}
.country-item .fl{font-size:20px}

/* Privacy toggles */
.tgl-row{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 0;border-bottom:1px solid var(--border)}
.tgl-row:last-child{border:none}
.tgl-row span{font-size:14px}
.tgl{width:46px;height:26px;border-radius:13px;background:var(--muted);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--primary)}
.tgl::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tgl.on::after{transform:translateX(20px)}

/* Comm prefs */
.chips{display:flex;flex-wrap:wrap;gap:8px;width:100%;justify-content:center}
.chip{padding:10px 16px;border-radius:20px;background:var(--surface);border:1.5px solid transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text);transition:border-color .2s}
.chip.sel{border-color:var(--primary);background:var(--surface2)}

/* === TOPBAR === */
.tb{padding:calc(6px + var(--safe-t)) 16px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg);z-index:5;border-bottom:1px solid rgba(255,255,255,.04)}
.tb h2{font-size:17px;font-weight:700;flex:1}
.tb .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.tb .ai-badge{font-size:10px;font-weight:700;background:var(--secondary);color:#0B1020;padding:2px 6px;border-radius:6px;margin-right:4px}
.tb .mode-badge{font-size:10px;color:var(--text2);margin-left:auto;margin-right:8px}
.tb .help-btn{background:none;border:none;color:var(--warn);font-size:18px;cursor:pointer;padding:4px}

/* === TABS === */
.tab-area{flex:1;overflow:hidden;position:relative}
.tab{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav) + var(--safe-b) + 16px)}
.tab[hidden]{display:none}

/* === BOTTOM NAV === */
.bn{position:relative;flex-shrink:0;height:calc(var(--nav) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--surface);border-top:1px solid rgba(255,255,255,.06);display:flex;z-index:10}
.bi{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:6px 4px;flex:1}
.bi .ic{font-size:20px;opacity:.4;transition:opacity .2s;line-height:1}
.bi .lb{font-size:9px;color:var(--muted);font-weight:500;transition:color .2s}
.bi.on .ic{opacity:1}
.bi.on .lb{color:var(--primary);font-weight:600}

/* === HOME === */
.greet{padding:16px}
.greet h3{font-size:18px;font-weight:700;margin-bottom:2px}
.greet p{font-size:13px;color:var(--text2)}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:16px}
.qa .ac{padding:14px 12px;border-radius:14px;background:var(--surface);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.qa .ac:active{border-color:var(--primary)}
.qa .ac .em{font-size:22px;margin-bottom:6px}
.qa .ac .lb{font-size:12px;font-weight:600}
.qa .ac .ds{font-size:10px;color:var(--text2);margin-top:2px}

/* Check-in */
.checkin{margin:0 16px 16px;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border)}
.checkin h4{font-size:14px;font-weight:600;margin-bottom:12px}
.ci-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ci-row:last-child{margin-bottom:0}
.ci-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0}
.ci-scale{display:flex;gap:4px;flex:1}
.ci-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text2)}
.ci-dot.sel{background:var(--primary);border-color:var(--primary);color:#0B1020}
.ci-note{width:100%;padding:10px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;resize:none;outline:none;margin-top:8px}
.ci-note:focus{border-color:var(--primary)}

/* Continue / Daily */
.sec{padding:0 16px;margin-bottom:16px}
.sec-t{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-left:2px}
.cont-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--surface);cursor:pointer;margin-bottom:6px}
.cont-card .em{font-size:20px;width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.cont-card .inf .lb{font-size:13px;font-weight:600}
.cont-card .inf .ds{font-size:11px;color:var(--text2)}
.daily{padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(121,199,195,.08),rgba(170,167,232,.08));border:1px solid var(--border);margin:0 16px 16px;cursor:pointer}
.daily h4{font-size:14px;font-weight:600;margin-bottom:4px}
.daily p{font-size:12px;color:var(--text2)}

/* === CHAT === */
.ch{display:flex;flex-direction:column;height:100%}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.55;animation:fi .25s}
.msg.u{align-self:flex-end;background:var(--primary);color:#0B1020;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:var(--surface);border-bottom-left-radius:4px}
.msg .md{font-size:9px;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.msg .act{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.msg .act button{padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.msg .act button:hover{border-color:var(--primary)}
.ch-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);text-align:center;padding:20px}
.ch-empty .em{font-size:40px;margin-bottom:10px;opacity:.5}
.ch-empty p{font-size:13px;line-height:1.5}
.ch-inp{padding:8px 12px calc(8px + var(--safe-b));border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg);flex-shrink:0}
.ch-inp input{flex:1;padding:11px 14px;border-radius:22px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.ch-inp input:focus{border-color:var(--primary)}
.ch-inp button{width:38px;height:38px;border-radius:50%;background:var(--primary);border:none;color:#0B1020;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700}
.typing{display:flex;gap:4px;padding:11px 14px;background:var(--surface);border-radius:14px;align-self:flex-start;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tp 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}

/* === TECHNIQUES === */
.tech-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.tech-cat{font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.8px;padding:8px 2px 4px}
.tc{padding:14px;border-radius:14px;background:var(--surface);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.tc:active{border-color:var(--primary)}
.tc h4{font-size:14px;font-weight:600;margin-bottom:3px}
.tc p{font-size:12px;color:var(--text2);line-height:1.4}
.tc .dur{font-size:11px;color:var(--muted);margin-top:4px}
.tc .tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px}
.tag-b{background:rgba(121,199,195,.12);color:var(--primary)}
.tag-g{background:rgba(121,198,154,.12);color:var(--accent)}
.tag-d{background:rgba(226,124,136,.12);color:var(--danger)}

/* === TECHNIQUE DETAIL === */
.det{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s ease}
.det.open{transform:none}
.det-h{padding:calc(10px + var(--safe-t)) 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.det-h .bk{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
.det-h h2{font-size:16px;font-weight:600;flex:1}
.det-b{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.det-b h3{font-size:17px;font-weight:700;margin-bottom:6px}
.det-b .meta{font-size:12px;color:var(--text2);margin-bottom:12px;display:flex;gap:12px}
.det-b p{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.det-b .stp{padding:12px;border-radius:12px;background:var(--surface);margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.det-b .stp-n{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#0B1020;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.det-b .stp-t{font-size:13px;line-height:1.5}
.det-b .caution{padding:12px;border-radius:12px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2);margin:12px 0;font-size:12px;color:var(--danger);line-height:1.5}
.det-b .done-btn{margin-top:16px}

/* === CALM ROOM === */
.calm{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;position:relative}
.calm .breath{width:160px;height:160px;border-radius:50%;border:3px solid var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:24px;opacity:.7;transition:transform 4s ease-in-out}
.calm .breath.inhale{transform:scale(1.3)}
.calm .breath.exhale{transform:scale(1)}
.calm .breath-text{font-size:14px;color:var(--primary);font-weight:600}
.calm .timer{font-size:48px;font-weight:700;color:var(--text2);margin-bottom:20px;font-variant-numeric:tabular-nums}
.calm .dur-btns{display:flex;gap:8px;margin-bottom:20px}
.calm .dur-btn{padding:8px 16px;border-radius:20px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.calm .dur-btn.sel{border-color:var(--primary);color:var(--primary)}
.calm .ctrls{display:flex;gap:12px}
.calm .ctrl{padding:12px 28px;border-radius:14px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.calm .ctrl:active{opacity:.8}
.calm .ctrl-start{background:var(--primary);color:#0B1020}
.calm .ctrl-stop{background:var(--surface);color:var(--text)}
.calm .grounding{margin-top:24px;padding:16px;border-radius:14px;background:var(--surface);width:100%;max-width:340px;text-align:left}
.calm .grounding h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary)}
.calm .grounding li{font-size:12px;color:var(--text2);margin-bottom:4px;line-height:1.5}

/* === PROGRESS === */
.prog{padding:16px}
.streak{padding:20px;border-radius:16px;background:linear-gradient(135deg,var(--surface),var(--surface2));text-align:center;margin-bottom:16px}
.streak .num{font-size:48px;font-weight:700;color:var(--primary);line-height:1}
.streak .lb{font-size:12px;color:var(--text2);margin-top:4px}
.cal{margin-bottom:16px}
.cal h4{font-size:13px;font-weight:600;margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-d{width:100%;aspect-ratio:1;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2)}
.cal-d.filled{background:var(--primary);color:#0B1020;font-weight:600}
.cal-d.half{background:rgba(121,199,195,.3);color:var(--text)}
.hab-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.hab{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--surface);cursor:pointer}
.hab:active{opacity:.8}
.hab .ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hab.dn .ck{background:var(--primary);border-color:var(--primary)}
.hab.dn .ck::after{content:'✓';color:#0B1020;font-size:12px;font-weight:700}
.hab .inf h4{font-size:13px;font-weight:600}
.hab .inf p{font-size:11px;color:var(--text2)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{padding:14px;border-radius:12px;background:var(--surface);text-align:center}
.stat .n{font-size:22px;font-weight:700}
.stat .l{font-size:10px;color:var(--text2);margin-top:2px}

/* === SETTINGS === */
.set{padding:16px}
.sg{margin-bottom:18px}
.sg h4{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding-left:2px}
.si{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface);margin-bottom:1px;cursor:pointer;transition:background .15s}
.si:first-child{border-radius:12px 12px 2px 2px}
.si:last-child{border-radius:2px 2px 12px 12px}
.si:only-child{border-radius:12px}
.si:active{background:var(--surface2)}
.si .em{font-size:16px;width:20px;text-align:center}
.si .lb{flex:1;font-size:14px}
.si .ar{color:var(--muted);font-size:12px}

/* Crisis banner */
.crisis{margin:0 16px 16px;padding:14px;border-radius:14px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2)}
.crisis h4{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:4px}
.crisis p{font-size:12px;color:var(--text2);line-height:1.5}
.crisis a{color:var(--danger);font-weight:600}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes tp{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
</style>
</head>

<script>
const K='loiva_done',D=document,$=id=>D.getElementById(id),A=$('A');

function dots(n){return`<div class="dots">${[0,1,2,3,4,5,6].map(i=>`<div class="dot${i===n?' on':''}"></div>`).join('')}</div>`}

/* === TECHNIQUE DATA === */
const TECH=[
{cat:'Тревожные мысли',items:[

desc:'Вернись в текущий момент через органы чувств.',

steps:['Назови 5 вещей, которые ты ВИДИШЬ.','Назови 4 вещи, которые ты можешь ПОТРОГАТЬ.','Назови 3 вещи, которые ты СЛЫШИШЬ.','Назови 2 вещи, которые ты можешь ЗАПАХНУТЬ.','Назови 1 вещь на ВКУС.']},
{icon:'📝',title:'Факты и предположения',dur:'5-7 мин',tags:['CBT','tag-b'],

steps:['Запиши ситуацию одним предложением.','Что ты знаешь НАВЕРНЯКА?','Что ты ПРЕДПОЛАГАЕШЬ?','Есть ли альтернативные объяснения?','Какая мысль кажется более сбалансированной?']},

// CHAT
let chStarted=false;
$('cSend').onclick=doSend;
$('cInp').onkeypress=e=>{if(e.key==='Enter')doSend()};
function doSend(){
const inp=$('cInp'),msg=inp.value.trim();if(!msg)return;
if(!chStarted){$('chE')?.remove();chStarted=true}
const box=$('msgs');
box.insertAdjacentHTML('beforeend',`<div class="msg u">${esc(msg)}</div>`);
inp.value='';
box.insertAdjacentHTML('beforeend',`<div class="typing" id="typ"><span></span><span></span><span></span></div>`);
box.scrollTop=box.scrollHeight;
setTimeout(()=>{
$('typ')?.remove();
const resp=AI_R[Math.floor(Math.random()*AI_R.length)];
box.insertAdjacentHTML('beforeend',`<div class="msg a"><div class="md">listen</div>${resp}<div class="act"><button>👍 Полезно</button><button>🔄 Попробовать иначе</button><button>💬 Сохранить вывод</button></div></div>`);
box.scrollTop=box.scrollHeight;
},1200);
}

// CALM ROOM
let calmInterval=null,calmSec=300,breathInterval=null;
window.setDur=(el,min)=>{el.parentElement.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');calmSec=min*60;updTimer()};
function updTimer(){const m=Math.floor(calmSec/60),s=calmSec%60;$('calmTimer').textContent=m+':'+String(s).padStart(2,'0')}
window.startCalm=()=>{$('calmStart').style.display='none';$('calmStop').style.display='';
breathInterval=setInterval(()=>{const b=$('breath'),t=$('brTxt');b.classList.toggle('inhale');b.classList.toggle('exhale');t.textContent=b.classList.contains('inhale')?'Вдох...':'Выдох...'},4000);
calmInterval=setInterval(()=>{if(calmSec<=0){stopCalm();return}calmSec--;updTimer()},1000)};
window.stopCalm=()=>{clearInterval(calmInterval);clearInterval(breathInterval);$('calmStart').style.display='';$('calmStop').style.display='none';$('breath').className='breath';$('brTxt').textContent='Готов';updTimer()};
