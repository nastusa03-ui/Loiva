<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B1020">
<title>Loiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B1020;--sf:#172237;--sf2:#1E2B43;--pr:#79C7C3;--sc:#AAA7E8;--ac:#79C69A;--tx:#F4F7FA;--tx2:#AAB6C6;--mu:#495670;--dn:#E27C88;--wn:#E2B66F;--bd:#2A3850;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;overflow:hidden;position:fixed;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
#A{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;visibility:hidden;transition:opacity .25s;z-index:1}
.scr.on{opacity:1;visibility:visible;z-index:2}
.ob{justify-content:center;align-items:center;padding:28px 20px;text-align:center;overflow-y:auto}
.ob .bk{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--tx2);font-size:26px;cursor:pointer;padding:8px}
.ob h1{font-size:36px;font-weight:700;margin-bottom:6px;color:var(--pr)}
.ob h2{font-size:22px;font-weight:700;margin-bottom:8px}
.ob p{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:20px;max-width:320px}
.w{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}
.btn{display:flex;align-items:center;justify-content:center;padding:14px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;width:100%;font-family:inherit}
.b1{background:var(--pr);color:#0B1020}
.b2{background:transparent;color:var(--tx);border:1.5px solid var(--bd)}
.dt{display:flex;gap:6px;margin-top:18px;justify-content:center}
.dt i{width:7px;height:7px;border-radius:50%;background:var(--mu);display:inline-block}
.dt i.on{background:var(--pr);width:20px;border-radius:4px}
.ab{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.ab button{padding:18px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-size:14px;font-weight:500;color:var(--tx);font-family:inherit}
.ab button .e{font-size:28px;margin-bottom:6px;display:block}
.lg{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px}
.lg button{padding:16px;border-radius:14px;background:var(--sf);border:2px solid transparent;cursor:pointer;text-align:center;font-family:inherit;color:var(--tx)}
.lg button.sel{border-color:var(--pr)}
.lg button .f{font-size:26px;margin-bottom:4px;display:block}
.cl{width:100%;max-height:280px;overflow-y:auto;margin-bottom:16px;text-align:left}
.cl div{padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px}
.cl div.sel{background:var(--sf)}
.tr{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 0;border-bottom:1px solid var(--bd)}
.tr:last-child{border:none}
.tr span{font-size:14px}
.tg{width:46px;height:26px;border-radius:13px;background:var(--mu);position:relative;cursor:pointer;flex-shrink:0}
.tg.on{background:var(--pr)}
.tg::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s}
.tg.on::after{transform:translateX(20px)}
.chips{display:flex;flex-wrap:wrap;gap:8px;width:100%;justify-content:center}
.chips button{padding:10px 16px;border-radius:20px;background:var(--sf);border:1.5px solid transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--tx)}
.chips button.sel{border-color:var(--pr);background:var(--sf2)}
.ac{padding:14px 12px;border-radius:14px;background:var(--sf);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.ac:active{border-color:var(--pr)}
.tc{padding:14px;border-radius:14px;background:var(--sf);cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.tc:active{border-color:var(--pr)}
.hi{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;background:var(--sf);cursor:pointer;margin-bottom:8px}
.hi:active{opacity:.8}
.hi .ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--mu);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hi.dn .ck{background:var(--pr);border-color:var(--pr)}
.hi.dn .ck::after{content:'\2713';color:#0B1020;font-size:12px;font-weight:700}
.si{display:flex;align-items:center;gap:10px;padding:12px;background:var(--sf);margin-bottom:1px;cursor:pointer;transition:background .15s}
.si:first-child{border-radius:12px 12px 2px 2px}
.si:last-child{border-radius:2px 2px 12px 12px}
.si:only-child{border-radius:12px}
.si:active{background:var(--sf2)}
.m{max-width:82%;padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.55}
.m.u{align-self:flex-end;background:var(--pr);color:#0B1020;border-bottom-right-radius:4px}
.m.a{align-self:flex-start;background:var(--sf);border-bottom-left-radius:4px}
.tp{display:flex;gap:4px;padding:11px 14px;background:var(--sf);border-radius:14px;align-self:flex-start;width:fit-content}
.tp span{width:6px;height:6px;border-radius:50%;background:var(--mu);animation:an 1.2s infinite}
.tp span:nth-child(2){animation-delay:.15s}
.tp span:nth-child(3){animation-delay:.3s}
.cBtn{padding:8px 16px;border-radius:20px;background:var(--sf);border:1.5px solid var(--bd);color:var(--tx);font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .15s}
.cBtn.sel{border-color:var(--pr);color:var(--pr)}
@keyframes an{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.det{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="A"></div>
<script>
(function(){
var A=document.getElementById('A');
var K='loiva_v4';
var busy=0;

function $(id){return document.getElementById(id)}
function sel(el){var p=el.parentElement;for(var i=0;i<p.children.length;i++)p.children[i].classList.remove('sel');el.classList.add('sel')}
window.sel=sel;
function tgl(el){el.classList.toggle('on')}
window.tgl=tgl;
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function goScreen(id){
var els=A.querySelectorAll('.scr');
for(var i=0;i<els.length;i++)els[i].classList.remove('on');
var t=$(id);if(t)t.classList.add('on');
}
window.goScreen=goScreen;

function enterApp(){
if(busy)return;busy=1;
try{localStorage.setItem(K,'1');buildMain();}catch(e){
A.innerHTML='<div style="padding:20px;color:white"><h2>Error</h2><pre>'+esc(e.message)+'</pre></div>';
}}
window.enterApp=enterApp;

function buildMain(){
A.innerHTML='';
var w=document.createElement('div');
w.style.cssText='display:flex;flex-direction:column;height:100%;position:relative';

var tb=document.createElement('div');
tb.style.cssText='padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)';
tb.innerHTML='<h2 style="font-size:17px;font-weight:700;flex:1">Loiva</h2><span style="font-size:10px;font-weight:700;background:var(--sc);color:#0B1020;padding:2px 6px;border-radius:6px">AI</span><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pr),var(--sc));display:flex;align-items:center;justify-content:center;font-size:14px">👤</div>';
w.appendChild(tb);

var ta=document.createElement('div');
ta.style.cssText='flex:1;overflow:hidden;position:relative';

/* === HOME === */
var tH=document.createElement('div');tH.id='mt-home';tH.style.cssText='position:absolute;inset:0;overflow-y:auto;padding:16px';
tH.innerHTML='<h3 style="font-size:18px;margin-bottom:12px">Что полезно сейчас?</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px"><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😰</div><div style="font-size:12px;font-weight:600">Тревожно</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😰</div><div style="font-size:12px;font-weight:600">Стресс</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">😔</div><div style="font-size:12px;font-weight:600">Тяжело</div></div><div class="ac" onclick="mSw(\'chat\')"><div style="font-size:22px;margin-bottom:4px">🗣</div><div style="font-size:12px;font-weight:600">Выговориться</div></div><div class="ac" onclick="mSw(\'tech\')"><div style="font-size:22px;margin-bottom:4px">🧘</div><div style="font-size:12px;font-weight:600">Практика</div></div><div class="ac" onclick="mSw(\'calm\')"><div style="font-size:22px;margin-bottom:4px">🌙</div><div style="font-size:12px;font-weight:600">Calm Room</div></div></div><div style="padding:14px;border-radius:14px;background:rgba(226,124,136,.08);border:1px solid rgba(226,124,136,.2);margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:var(--dn)">🆘 Нужна помощь?</div><div style="font-size:12px;color:var(--tx2);margin-top:4px">Позвони: <a href="tel:8-800-2000-122" style="color:var(--dn)">8-800-2000-122</a></div></div>';
ta.appendChild(tH);

/* === CHAT === */
var tC=document.createElement('div');tC.id='mt-chat';tC.style.cssText='position:absolute;inset:0;display:none;flex-direction:column';
tC.innerHTML='<div style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px" id="mMsgs"><div style="text-align:center;color:var(--tx2);padding:40px 20px"><div style="font-size:36px;margin-bottom:8px;opacity:.5">💬</div><p style="font-size:13px">Начни диалог с Loiva</p></div></div><div style="padding:8px 12px;border-top:1px solid var(--bd);display:flex;gap:8px"><input id="mInp" style="flex:1;padding:11px 14px;border-radius:22px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:14px;outline:none;font-family:inherit" placeholder="Напиши..."><button onclick="mSend()" style="width:38px;height:38px;border-radius:50%;background:var(--pr);border:none;color:#0B1020;font-size:18px;cursor:pointer;font-weight:700">↑</button></div>';
ta.appendChild(tC);

/* === TECH === */
var tT=document.createElement('div');tT.id='mt-tech';tT.style.cssText='position:absolute;inset:0;overflow-y:auto;padding:12px;display:none';
var techData=[
{cat:'Тревожные мысли',items:[
{icon:'🧊',name:'5-4-3-2-1 Заземление',dur:'3-5 мин',desc:'Вернись в момент через органы чувств.',caution:'Не закрывай глаза если это усиливает тревогу.',steps:['Назови 5 вещей которые ВИДИШЬ','Назови 4 вещи которые можешь ПОТРОГАТЬ','Назови 3 вещи которые СЛЫШИШЬ','Назови 2 вещи которые можешь ЗАПАХНУТЬ','Назови 1 вещь на ВКУС']},
{icon:'📝',name:'Факты и предположения',dur:'5-7 мин',desc:'Отдели известное от предположений.',caution:null,steps:['Запиши ситуацию одним предложением','Что знаешь НАВЕРНЯКА?','Что ПРЕДПОЛАГАЕШЬ?','Есть ли альтернативы?']},
{icon:'🎯',name:'Зона контроля',dur:'3-5 мин',desc:'Что зависит от тебя, а что нет.',caution:null,steps:['Напиши ситуацию','Раздели: МОЁ / НЕ МОЁ','Для МОЁ - одно действие','Для НЕ МОЁ - принять']}
]},
{cat:'Стресс',items:[
{icon:'🫁',name:'Мягкое дыхание',dur:'2-3 мин',desc:'Плавно замедли дыхание.',caution:'Не задерживай дыхание принудительно.',steps:['Сядь удобно','Дыши обычно 30 сек','Удлиняй выдох на 1-2 счёта','Продолжай 2-3 минуты']},
{icon:'📦',name:'Следующий шаг',dur:'2-5 мин',desc:'Самое маленькое действие сейчас.',caution:null,steps:['Что можно за 2 минуты?','Это реалистично?','Готов? Сделай.']}
]},
{cat:'Сниженное настроение',items:[
{icon:'💛',name:'Маленький шаг',dur:'2-5 мин',desc:'Минимальное действие.',caution:null,steps:['Что полезно?','Мало энергии?','Сделай.']},
{icon:'🤝',name:'Самосострадание',dur:'3-5 мин',desc:'Доброта к себе как к другу.',caution:null,steps:['Что бы сказал другу?','Скажи себе.']}
]},
{cat:'Кризис',items:[
{icon:'🆘',name:'Crisis Grounding',dur:'3-5 мин',desc:'Быстрая помощь при панике.',caution:'При реальной опасности звони 112.',steps:['Скажи: это паника, она пройдёт','Возьми холодный предмет','Назови где ты, какой день','Не помогает? Звони 8-800-2000-122']}
]}
];
var thtml='';
techData.forEach(function(cat){
thtml+='<div style="font-size:12px;font-weight:700;color:var(--pr);text-transform:uppercase;letter-spacing:.8px;padding:8px 2px 4px">'+cat.cat+'</div>';
cat.items.forEach(function(t){
thtml+='<div class="tc" onclick="openDetail(\''+esc(t.name).replace(/'/g,"\\'")+'\')"><h4 style="font-size:14px;font-weight:600;margin-bottom:3px">'+t.icon+' '+t.name+'</h4><p style="font-size:12px;color:var(--tx2);line-height:1.4">'+t.desc+'</p><div style="font-size:11px;color:var(--mu);margin-top:4px">⏱ '+t.dur+'</div></div>';
});
});
tT.innerHTML=thtml;
ta.appendChild(tT);

/* === CALM === */
var tCa=document.createElement('div');tCa.id='mt-calm';tCa.style.cssText='position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center';
tCa.innerHTML='<div id="mBreath" style="width:140px;height:140px;border-radius:50%;border:3px solid var(--pr);display:flex;align-items:center;justify-content:center;margin-bottom:20px;transition:transform 4s"><span id="mBrT" style="color:var(--pr);font-weight:600">Готов</span></div><div id="mTimer" style="font-size:42px;font-weight:700;color:var(--tx2);margin-bottom:12px">5:00</div><div style="display:flex;gap:8px;margin-bottom:12px;align-items:center"><button class="cBtn" onclick="mDur(this,1)">1</button><button class="cBtn" onclick="mDur(this,3)">3</button><button class="cBtn sel" onclick="mDur(this,5)">5</button><button class="cBtn" onclick="mDur(this,10)">10</button><span style="color:var(--tx2);font-size:13px">мин</span><input id="mCustom" type="number" min="1" max="120" placeholder="своё" style="width:52px;padding:6px;border-radius:12px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:13px;text-align:center;font-family:inherit" oninput="mCustomDur(this.value)"></div><div style="display:flex;gap:10px"><button id="mStart" onclick="mStartCalm()" style="padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--pr);color:#0B1020;cursor:pointer">Старт</button><button id="mStop" onclick="mStopCalm()" style="padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--sf);color:var(--tx);cursor:pointer;display:none">Стоп</button><button id="mReset" onclick="mResetCalm()" style="padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--sf);color:var(--tx);cursor:pointer;display:none">Сброс</button></div>';
ta.appendChild(tCa);

/* === PROGRESS === */
var tP=document.createElement('div');tP.id='mt-prog';tP.style.cssText='position:absolute;inset:0;overflow-y:auto;padding:16px;display:none';
var today=new Date().getDate();var calD='';for(var i=1;i<=28;i++){var isToday=i===today;var r=Math.random();var bg=isToday?'var(--pr)':r>.7?'var(--pr)':r>.4?'rgba(121,199,195,.3)':'var(--sf)';var clr=isToday?'#0B1020':r>.7?'#0B1020':'var(--tx2)';var brd=isToday?'border:2px solid var(--tx)':'';calD+='<div style="width:100%;aspect-ratio:1;border-radius:6px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:10px;color:'+clr+';'+brd+'">'+i+'</div>'}
tP.innerHTML='<div style="padding:20px;border-radius:16px;background:linear-gradient(135deg,var(--sf),var(--sf2));text-align:center;margin-bottom:16px"><div style="font-size:48px;font-weight:700;color:var(--pr)">7</div><div style="font-size:12px;color:var(--tx2)">дней подряд</div></div><div style="font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px">Активность за месяц</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px">'+calD+'</div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div style="font-size:13px;font-weight:600;color:var(--tx2)">Привычки</div><button onclick="addHabit()" style="background:none;border:none;color:var(--pr);font-size:20px;cursor:pointer;padding:2px 6px">+</button></div><div id="mHab"></div><div style="font-size:13px;font-weight:600;color:var(--tx2);margin:16px 0 8px">Статистика</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="padding:14px;border-radius:12px;background:var(--sf);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--pr)">23</div><div style="font-size:10px;color:var(--tx2)">Дней</div></div><div style="padding:14px;border-radius:12px;background:var(--sf);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--ac)">47</div><div style="font-size:10px;color:var(--tx2)">Диалогов</div></div><div style="padding:14px;border-radius:12px;background:var(--sf);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--sc)">12</div><div style="font-size:10px;color:var(--tx2)">Техник</div></div><div style="padding:14px;border-radius:12px;background:var(--sf);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--wn)">85%</div><div style="font-size:10px;color:var(--tx2)">Выполнение</div></div></div>';
ta.appendChild(tP);

/* === SETTINGS === */
var tS=document.createElement('div');tS.id='mt-set';tS.style.cssText='position:absolute;inset:0;overflow-y:auto;padding:16px;display:none';
var setVals={lang:'Русский',country:'Россия',len:'Средне',tone:'Мягко',mode:'Listen',mem:'Вкл',notif:'Вкл',quiet:'22-08',theme:'Системная'};

function showPicker(key,label,opts,cur){
var ov=document.createElement('div');
ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center';
var sheet=document.createElement('div');
sheet.style.cssText='width:100%;max-width:480px;background:var(--sf);border-radius:16px 16px 0 0;padding:20px 16px 32px;max-height:70vh;overflow-y:auto';
sheet.innerHTML='<div style="display:flex;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:600;flex:1">'+label+'</h3><button id="pickerClose" style="background:none;border:none;color:var(--tx2);font-size:20px;cursor:pointer">✕</button></div>';
opts.forEach(function(opt){
var row=document.createElement('div');
row.style.cssText='padding:14px;border-radius:12px;cursor:pointer;margin-bottom:4px;font-size:15px;display:flex;align-items:center;justify-content:space-between';
if(opt===cur){row.style.background='var(--sf2)';row.style.border='1px solid var(--pr)'}
row.innerHTML=opt+(opt===cur?'<span style="color:var(--pr);font-weight:700">✓</span>':'');
row.onclick=function(){setVals[key]=opt;renderSet();ov.remove()};
sheet.appendChild(row);
});
ov.appendChild(sheet);
ov.onclick=function(e){if(e.target===ov)ov.remove()};
document.body.appendChild(ov);
$('pickerClose').onclick=function(){ov.remove()};
}

var tS=document.createElement('div');tS.id='mt-set';tS.style.cssText='position:absolute;inset:0;overflow-y:auto;padding:16px;display:none';
function renderSet(){
tS.innerHTML='';
var groups=[
{title:'Общие',items:[
{icon:'🌍',key:'lang',label:'Язык',opts:['Русский','English']},
{icon:'🏳',key:'country',label:'Страна',opts:['Россия','Украина','Казахстан','Беларусь','Грузия','США','Германия','Франция','Израиль','Корея','Япония']},
{icon:'💬',key:'len',label:'Длина ответа',opts:['Коротко','Средне','Подробно']},
{icon:'🎭',key:'tone',label:'Тон ответа',opts:['Мягко','Нейтрально']}
]},

function uTimer(){var m=Math.floor(calmSec/60),s=calmSec%60;var el=$('mTimer');if(el)el.textContent=m+':'+(s<10?'0':'')+s}
window.mStartCalm=function(){
if(calmRunning)return;calmRunning=true;
var ms=$('mStart'),msp=$('mStop'),mrs=$('mReset');
if(ms)ms.style.display='none';if(msp)msp.style.display='';if(mrs)mrs.style.display='';

calmIv=setInterval(function(){if(calmSec<=0){mStopCalm();return}calmSec--;uTimer()},1000);
};
window.mStopCalm=function(){
clearInterval(calmIv);clearInterval(breathIv);calmRunning=false;
var ms=$('mStart'),msp=$('mStop'),mrs=$('mReset'),b=$('mBreath'),t=$('mBrT');
if(ms)ms.style.display='';if(msp)msp.style.display='none';if(mrs)mrs.style.display='';
if(b)b.style.transform='scale(1)';if(t)t.textContent='Готов';
};
window.mResetCalm=function(){
mStopCalm();calmSec=300;uTimer();
var btns=$('mt-calm').querySelectorAll('.cBtn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('sel');
